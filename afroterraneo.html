<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Discover Afroterraneo, Kiko Navarro's Afro-Mediterranean music project." />
  <meta name="keywords"
    content="Afroterraneo, Kiko Navarro, Afro-Mediterranean music, House music, Wonderwheel Recordings" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kikonavarro.es/afroterraneo.html" />
  <meta property="og:title" content="Afroterraneo - Kiko Navarro" />
  <meta property="og:description" content="Discover Afroterraneo, Kiko Navarro's Afro-Mediterranean music project." />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />

  <meta property="twitter:title" content="Afroterraneo - Kiko Navarro" />
  <meta property="twitter:description"
    content="Discover Afroterraneo, Kiko Navarro's Afro-Mediterranean music project." />
  <meta property="twitter:image" content="https://kikonavarro.es/assets/img/afroterraneo-album.jpg" />

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="assets/js/components.js" defer></script>

  <!-- JSON-LD MusicGroup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "Afroterraneo",
    "description": "Afroterraneo is the culmination of Kiko Navarro's musical journey. Blending the electronic pulse of House music with live instrumentation and the deep, ancestral rhythms of Africa and the Mediterranean.",
    "url": "https://kikonavarro.es/afroterraneo.html",
    "member": [
      {
        "@type": "Person",
        "name": "Kiko Navarro"
      }
    ]
  }
  </script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar"></nav>

  <header class="page-header">
    <img src="assets/img/afroterraneo-album.jpg" alt="Afroterraneo" class="hero-bg">
    <div class="hero-overlay"></div>
    <div class="page-header-content">
      <h1 class="page-title">Afroterraneo</h1>
    </div>
  </header>

  <main>
    <section>
      <div class="container">
        <div class="afro-flex-row">
          <img src="assets/img/afroterraneo-album.jpg" alt="Afroterraneo Album" class="afro-main-img">
          <div class="afro-info-col">
            <img src="assets/img/afroterraneo-logo.png" alt="Afroterraneo Logo"
              style="max-width: 200px; margin-bottom: 2rem;">
            <h3 style="color: var(--primary); margin-bottom: 1rem;">Wonderwheel Recordings</h3>
            <p>
              Afroterraneo is the culmination of Kiko Navarro's musical journey.
              Blending the electronic pulse of House music with live instrumentation
              and the deep, ancestral rhythms of Africa and the Mediterranean.
            </p>
            <div class="afro-player-container" style="margin: 2rem 0;">
              <iframe src="https://open.spotify.com/embed/album/4BpBqfC0qi6MaB3l96QBo4" width="100%" height="80"
                frameBorder="0" allowtransparency="true" allow="encrypted-media"></iframe>
            </div>
            <div class="album-links">
              <a href="https://open.spotify.com/album/4BpBqfC0qi6MaB3l96QBo4" target="_blank"
                class="platform-btn spotify"><img src="assets/icons/Spotify.svg"></a>
              <a href="https://kikonavarro.bandcamp.com" target="_blank" class="platform-btn bandcamp"><img
                  src="assets/icons/bandcamp.png"></a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section style="background-color: var(--bg-surface);">
      <div class="container">
        <h2 class="section-title">Live <span>Gallery</span></h2>
        <div class="album-grid">
          <div class="album-item">
            <img src="assets/img/afroterraneo-live-1.jpg" alt="Live session 1">
          </div>
          <div class="album-item">
            <img src="assets/img/afroterraneo-live-2.jpg" alt="Live session 2">
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer" id="footer-placeholder"></footer>

</body>

</html>
